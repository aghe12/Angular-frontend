<section>

  <form>
    <input type="text" placeholder="Filter by city" />
    <button class="primary" type="button">Search</button>
  </form>
  <div class="control-container">

  <section class="mode-bar">
    <label class="mode-toggle">
      <input type="checkbox" (change)="handleCheck($event)" />
      <span class="mode-toggle-track">
        <span class="mode-toggle-thumb"></span>
      </span>
    </label>
    <span class="mode-label" [class.edit-active]="mode() === 'edit'">
      @if (mode() === 'edit') {
        Edit Mode Active
      } @else {
        Normal Mode
      }
    </span>
    @if (mode() === 'edit' && selectedVms.length > 0) {
      <button class="delete-btn" (click)="handleDelete()">
        Delete Selected ({{ selectedVms.length }})
      </button>
    }
    @if (mode() === 'edit') {
      <button class="restore-btn" (click)="handleRestore()">
        Restore All Deleted
      </button>
    }
  </section>
  @if(mode()=='edit'){
        <button (click)="handleAdd()">Add New Location</button>

  }
</div>
</section>


<section class="results">
  @for (housingLocation of locationsToDisplay(); track housingLocation.id) {
    <app-housing-location
      [housingLocation]="housingLocation"
      [mode]="mode()"
      [isSelected]="isSelected(housingLocation.id)"
      (onLocationClick)="handleLocationClick($event)"
      (onAddLocation)="handleAdd()"
    />
  } @empty {
    <h2>There are no items to display</h2>
  }
</section>
<router-outlet></router-outlet>
