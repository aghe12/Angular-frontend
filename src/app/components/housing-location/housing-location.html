<!-- selected class is applied when isSelected() is true -->
<button class="container" [class.selected]="isSelected()" (click)="handleClick($event)">
  <section class="listing">
    <img
      class="listing-photo"
      [src]="housingLocation().photo"
      alt="Exterior photo of {{ housingLocation().name }}"
      crossorigin
    />
    <h2 class="listing-heading">{{ housingLocation().name }}</h2>
    <p class="listing-location">{{ housingLocation().city }}, {{ housingLocation().state }}</p>
    @if (housingLocation().wifi) {
      <p class="listing-wifi">WiFi available</p>
    } @else {
      <p class="listing-wifi">No WiFi</p>
    }
  </section>
</button>
